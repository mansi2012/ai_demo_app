<div class="min-h-screen bg-slate-50">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-4">
      <div class="flex items-center gap-2">
        <div class="inline-flex h-8 w-8 items-center justify-center rounded-md bg-brand-600 text-white text-sm font-bold">
          S
        </div>
        <span class="text-sm font-semibold text-slate-900">Simple Demo App</span>
      </div>
      <button type="button" class="btn-ghost" (click)="logout()">Sign out</button>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-4 py-12">
    <div class="card p-8">
      @if (user(); as u) {
        <h1 class="text-2xl font-semibold text-slate-900">
          Welcome, {{ u.firstName }} {{ u.lastName }} 👋
        </h1>
        <p class="mt-2 text-sm text-slate-600">
          You're signed in as <span class="font-medium text-slate-900">{{ u.username }}</span>.
        </p>

        <dl class="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div class="rounded-lg border border-slate-200 p-4">
            <dt class="text-xs uppercase tracking-wide text-slate-500">Email</dt>
            <dd class="mt-1 text-sm text-slate-900">{{ u.email }}</dd>
          </div>
          <div class="rounded-lg border border-slate-200 p-4">
            <dt class="text-xs uppercase tracking-wide text-slate-500">User ID</dt>
            <dd class="mt-1 text-sm text-slate-900">#{{ u.id }}</dd>
          </div>
        </dl>
      }
    </div>
  </main>
</div>
