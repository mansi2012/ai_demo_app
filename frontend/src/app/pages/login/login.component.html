<app-auth-shell title="Welcome back" subtitle="Sign in to continue to your dashboard">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5" novalidate>
    @if (serverError()) {
      <div class="rounded-md border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-700">
        {{ serverError() }}
      </div>
    }

    <div class="flex flex-col gap-3 sm:flex-row">
      <button
        type="button"
        class="btn bg-white text-slate-700 border border-slate-300 hover:bg-slate-50 focus:ring-brand-500 w-full gap-2"
        aria-label="Sign in with Google"
        (click)="onSocialLoginClick('google')"
      >
        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.84l6.09-6.09C34.46 3.39 29.5 1.5 24 1.5 14.82 1.5 7.01 7.1 3.64 15.01l7.08 5.5C12.4 14.09 17.73 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.15 24.5c0-1.57-.14-3.09-.4-4.55H24v8.61h12.44c-.54 2.9-2.18 5.36-4.64 7.01l7.1 5.52C42.99 37.36 46.15 31.36 46.15 24.5z"/>
          <path fill="#FBBC05" d="M10.72 28.51A14.55 14.55 0 0 1 9.5 24c0-1.57.27-3.09.72-4.51l-7.08-5.5A22.47 22.47 0 0 0 1.5 24c0 3.61.86 7.02 2.64 10.01l6.58-5.5z"/>
          <path fill="#34A853" d="M24 46.5c5.5 0 10.13-1.82 13.5-4.94l-7.1-5.52c-1.82 1.22-4.15 1.96-6.4 1.96-6.27 0-11.6-4.59-13.28-10.99l-6.58 5.5C7.01 40.9 14.82 46.5 24 46.5z"/>
        </svg>
        <span>Google</span>
      </button>

      <button
        type="button"
        class="btn bg-white text-slate-700 border border-slate-300 hover:bg-slate-50 focus:ring-brand-500 w-full gap-2"
        aria-label="Sign in with Facebook"
        (click)="onSocialLoginClick('facebook')"
      >
        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#1877F2" d="M48 24C48 10.74 37.26 0 24 0S0 10.74 0 24c0 11.98 8.77 21.9 20.25 23.71V30.94h-6.09V24h6.09v-5.29c0-6.02 3.58-9.34 9.07-9.34 2.63 0 5.38.47 5.38.47v5.92h-3.03c-2.98 0-3.91 1.85-3.91 3.75V24h6.66l-1.06 6.94H27.76v16.77C39.23 45.9 48 35.98 48 24z"/>
          <path fill="#fff" d="M33.36 30.94l1.06-6.94h-6.66v-4.49c0-1.9.93-3.75 3.91-3.75h3.03v-5.92s-2.75-.47-5.38-.47c-5.49 0-9.07 3.32-9.07 9.34V24h-6.09v6.94h6.09v16.77a24.14 24.14 0 0 0 7.5 0V30.94h5.61z"/>
        </svg>
        <span>Facebook</span>
      </button>
    </div>

    <div class="flex items-center gap-3">
      <div class="h-px flex-1 bg-slate-200"></div>
      <span class="text-xs uppercase tracking-wide text-slate-500">or continue with</span>
      <div class="h-px flex-1 bg-slate-200"></div>
    </div>

    <div>
      <label for="identifier" class="form-label">Username or Email</label>
      <input
        id="identifier"
        type="text"
        autocomplete="username"
        class="form-input"
        formControlName="identifier"
        placeholder="jane.doe or jane@example.com"
      />
      @if (controlInvalid('identifier')) {
        <p class="form-error">Username or email is required.</p>
      }
    </div>

    <div>
      <label for="password" class="form-label">Password</label>
      <input
        id="password"
        type="password"
        autocomplete="current-password"
        class="form-input"
        formControlName="password"
        placeholder="••••••••"
      />
      @if (controlInvalid('password')) {
        <p class="form-error">Password is required.</p>
      }
    </div>

    <button type="submit" class="btn-primary w-full" [disabled]="submitting()">
      {{ submitting() ? 'Signing in…' : 'Sign in' }}
    </button>

    <p class="text-center text-sm text-slate-600">
      Don't have an account?
      <a routerLink="/register" class="font-medium text-brand-600 hover:text-brand-700">Create one</a>
    </p>
  </form>
</app-auth-shell>
