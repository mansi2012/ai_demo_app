<div class="card max-w-md mx-auto px-4">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

    <!-- Header -->
    <div class="mb-6 text-center">
      <h1 class="text-2xl font-bold text-slate-800">Welcome back</h1>
      <p class="mt-1 text-sm text-slate-500">Sign in to your account</p>
    </div>

    <!-- Global error -->
    @if (errorMessage()) {
      <div role="alert" aria-live="polite" class="mb-4 rounded-md bg-rose-50 px-4 py-3 text-sm text-rose-700">
        {{ errorMessage() }}
      </div>
    }

    <!-- Email -->
    <div class="mb-4">
      <label for="email" class="form-label">Email</label>
      <input
        id="email"
        type="email"
        class="form-input"
        formControlName="email"
        placeholder="you@example.com"
        autocomplete="email"
        aria-label="Email"
        [attr.aria-describedby]="emailError() ? 'email-error' : null"
      />
      @if (emailError()) {
        <p id="email-error" class="form-error" aria-live="polite">{{ emailError() }}</p>
      }
    </div>

    <!-- Password -->
    <div class="mb-0">
      <label for="password" class="form-label">Password</label>
      <input
        id="password"
        type="password"
        class="form-input"
        formControlName="password"
        placeholder="••••••••"
        autocomplete="current-password"
        aria-label="Password"
        [attr.aria-describedby]="passwordError() ? 'password-error' : null"
      />
      @if (passwordError()) {
        <p id="password-error" class="form-error" aria-live="polite">{{ passwordError() }}</p>
      }
    </div>

    <!-- Social Media Icons (immediately below password field) -->
    <fieldset class="mt-4">
      <legend class="sr-only">Or continue with</legend>
      <div class="flex items-center justify-center gap-3">

        <!-- Google -->
        <a
          href="#"
          aria-label="Sign in with Google"
          class="flex h-10 w-10 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-600 transition-colors hover:bg-brand-50 hover:text-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-5 w-5" fill="currentColor" aria-hidden="true">
            <path d="M21.805 10.023H12v3.977h5.618c-.242 1.242-.98 2.296-2.086 3.001v2.493h3.378c1.977-1.821 3.117-4.507 3.117-7.485 0-.501-.044-.988-.122-1.986z" fill="#4285F4"/>
            <path d="M12 22c2.7 0 4.963-.895 6.61-2.426l-3.378-2.493c-.894.599-2.037.952-3.232.952-2.484 0-4.588-1.678-5.342-3.932H3.179v2.573A9.997 9.997 0 0 0 12 22z" fill="#34A853"/>
            <path d="M6.658 14.101A5.973 5.973 0 0 1 6.345 12c0-.733.127-1.443.313-2.101V7.326H3.179A9.997 9.997 0 0 0 2 12c0 1.614.387 3.14 1.179 4.674l3.479-2.573z" fill="#FBBC05"/>
            <path d="M12 6.068c1.4 0 2.656.481 3.645 1.426l2.734-2.734C16.959 3.236 14.696 2.003 12 2.003A9.997 9.997 0 0 0 3.179 7.326l3.479 2.573C7.412 7.746 9.516 6.068 12 6.068z" fill="#EA4335"/>
          </svg>
        </a>

        <!-- GitHub -->
        <a
          href="#"
          aria-label="Sign in with GitHub"
          class="flex h-10 w-10 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-700 transition-colors hover:bg-brand-50 hover:text-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-5 w-5" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.091-.647.35-1.087.636-1.337-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
          </svg>
        </a>

        <!-- Twitter / X -->
        <a
          href="#"
          aria-label="Sign in with Twitter"
          class="flex h-10 w-10 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-700 transition-colors hover:bg-brand-50 hover:text-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-5 w-5" fill="currentColor" aria-hidden="true">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
        </a>

      </div>

      <p class="mt-2 text-center text-xs text-slate-400">or continue with</p>
    </fieldset>

    <!-- Submit Button -->
    <div class="mt-6">
      <button
        type="submit"
        class="btn btn-primary w-full"
        [disabled]="loading()"
        [attr.aria-busy]="loading()"
      >
        @if (loading()) {
          <span class="mr-2 inline-block h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent" aria-hidden="true"></span>
          Signing in…
        } @else {
          Sign In
        }
      </button>
    </div>

    <!-- Footer / Secondary Actions -->
    <div class="mt-4 flex flex-col items-center gap-2 text-sm">
      <a routerLink="/forgot-password" class="btn-ghost text-slate-600 hover:text-brand-600">Forgot password?</a>
      <p class="text-slate-500">
        Don't have an account?
        <a routerLink="/register" class="font-medium text-brand-600 hover:text-brand-700 hover:underline">Sign up</a>
      </p>
    </div>

  </form>
</div>
